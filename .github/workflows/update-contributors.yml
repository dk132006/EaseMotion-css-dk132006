name: Update Contributors

on:
  push:
    branches: [main]          # fires on every merge to main (most reliable)
  schedule:
    - cron: "0 0 * * 0"      # every Sunday at midnight UTC
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch contributors from GitHub API
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contributors?per_page=30" \
            > /tmp/contributors.json
          echo "Fetched contributors:"
          cat /tmp/contributors.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for c in data:
              print(c.get('login',''), c.get('contributions', 0), c.get('type',''))
          "

      - name: Update README contributors table
        run: |
          cat > /tmp/update_contributors.py << 'PYEOF'
          import json, re

          with open('/tmp/contributors.json') as f:
              data = json.load(f)

          humans = [c for c in data if c.get('type') != 'Bot' and '[bot]' not in c.get('login','').lower()]

          lines = [
              '<!-- CONTRIBUTORS-TABLE-START -->',
              '> 📌 Top contributors — auto-updated by GitHub Actions on every merge to main.',
              '',
              '| # | Contributor | Contributions |',
              '|---|-------------|:-------------:|',
          ]
          for i, c in enumerate(humans, 1):
              lines.append(f"| {i} | [@{c['login']}](https://github.com/{c['login']}) | {c['contributions']} |")
          lines.append('<!-- CONTRIBUTORS-TABLE-END -->')

          new_block = '\n'.join(lines)

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          pattern = re.compile(r'<!-- CONTRIBUTORS-TABLE-START -->.*?<!-- CONTRIBUTORS-TABLE-END -->', re.DOTALL)

          if not pattern.search(content):
              print('ERROR: Markers not found in README.md')
              exit(1)

          updated = pattern.sub(new_block, content)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(updated)

          print(f'Done. {len(humans)} contributors written to table.')
          PYEOF
          python3 /tmp/update_contributors.py

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet README.md && echo "No changes to commit." || (
            git add README.md &&
            git commit -m "chore: auto-update contributors table [skip ci]" &&
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          )
